services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '127.0.0.1:54329:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.12-alpine
    command: ['-c', '/etc/nats/nats-server.conf']
    ports:
      - '127.0.0.1:4222:4222'
      - '127.0.0.1:8222:8222'
    volumes:
      - ./docker/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats_jetstream_data:/data/jetstream
    healthcheck:
      test:
        ['CMD-SHELL', 'wget -q -O - "http://localhost:8222/healthz?js-enabled-only=true" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nui:
    image: ghcr.io/nats-nui/nui:latest
    command: ['--nats-cli-contexts=/nats-cli-contexts']
    ports:
      - '127.0.0.1:31311:31311'
    volumes:
      - ./docker/nui/contexts:/nats-cli-contexts:ro
      - nui_data:/db
    depends_on:
      nats:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  nats_jetstream_data:
  nui_data:
