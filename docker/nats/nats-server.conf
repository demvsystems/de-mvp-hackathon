server_name: "nats-dev"

# Client connections
port: 4222

# HTTP monitoring endpoint (used by /healthz, /jsz, /varz)
http_port: 8222

# JetStream persistence layer
jetstream {
  store_dir: "/data/jetstream"
  max_memory_store: 268435456   # 256MB
  max_file_store:   2147483648  # 2GB
}

# Auth is intentionally disabled for local dev.
# To enable token-based auth, uncomment the block below, restart the
# container, and set NATS_URL on clients to:
#   nats://<token>@localhost:4222
#
# authorization {
#   token: "replace-me-with-a-strong-token"
# }
